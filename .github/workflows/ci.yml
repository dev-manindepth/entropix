name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Lint
        run: pnpm turbo run lint --filter='./packages/*'

      - name: Type check
        run: pnpm turbo run check-types --filter='./packages/*'

      - name: Run tests
        run: pnpm turbo run test --filter='./packages/*'

  build-apps:
    name: Build Apps
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm turbo run build --filter=web

      - name: Build demo app
        run: pnpm turbo run build --filter=demo

  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Verify package contents
        run: |
          echo "=== @entropix/tokens ==="
          cd packages/tokens && npm pack --dry-run && cd ../..
          echo ""
          echo "=== @entropix/core ==="
          cd packages/core && npm pack --dry-run && cd ../..
          echo ""
          echo "=== @entropix/react ==="
          cd packages/react && npm pack --dry-run && cd ../..
          echo ""
          echo "=== @entropix/react-native ==="
          cd packages/react-native && npm pack --dry-run && cd ../..
